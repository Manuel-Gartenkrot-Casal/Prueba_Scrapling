services:

  scrapers:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - PYTHONUNBUFFERED=1
    env_file:
      - .env          # inyecta NVIDIA_API_KEY para generar_articulo.py
    networks:
      - app

  express:
    build:
      context: ./express
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - SCRAPERS_URL=http://scrapers:5000
    depends_on:
      - scrapers
    networks:
      - app

networks:
  app:
    driver: bridge
