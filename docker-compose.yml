services:

  scrapers:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - PYTHONUNBUFFERED=1
      - LMSTUDIO_URL=http://host.docker.internal:1234/v1
      - MONGO_URI=${MONGO_URI}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    # Montamos el código Python para no rebuildear la imagen en cada cambio.
    # Solo pisa el código en /app; Playwright/camoufox viven fuera y no se tocan.
    volumes:
      - ./spiders:/app/spiders
      - ./db.py:/app/db.py
      - ./flask_api.py:/app/flask_api.py
      - ./lm_studio.py:/app/lm_studio.py
      - ./embeddings.py:/app/embeddings.py
      - ./generar_articulo.py:/app/generar_articulo.py
      - ./runlanacion.py:/app/runlanacion.py
      - ./runaftermarket.py:/app/runaftermarket.py
      - ./runambito.py:/app/runambito.py
      - ./runcenital.py:/app/runcenital.py
      - ./runperfil.py:/app/runperfil.py
      - ./runcustom.py:/app/runcustom.py
    networks:
      - app

  express:
    build:
      context: ./express
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - SCRAPERS_URL=http://scrapers:5000
    volumes:
      - ./express/src/public:/app/dist/public
    depends_on:
      - scrapers
    networks:
      - app

networks:
  app:
    driver: bridge
